                <div class="name">🎮 CHOOSE YOUR MISSION</div>
                <div style="font-size:0.9rem;">⚠️ 10 real airport situations · ALL answers look correct · ONLY ONE saves your job</div>
            </div>
            <div class="menu-grid">
        `;
        for (const [key, story] of Object.entries(STORIES)) {
            html += `
                <div class="story-card" data-story="${key}">
                    <div class="story-title">${story.title}</div>
                    <div class="story-desc">${story.desc}</div>
                    <div style="font-size:0.7rem; margin-top:8px; color:#4a7a9c;">📖 ${story.vocab}</div>
                </div>
            `;
        }
        html += `</div><div class="footer">✈️ 10 stories · discuss with classmates · think before you click</div>`;
        container.innerHTML = html;
        document.querySelectorAll('.story-card').forEach(card => {
            card.addEventListener('click', () => {
                startStory(card.getAttribute('data-story'));
            });
        });
    }

    function startStory(storyId) {
        currentScreen = 'story';
        activeStory = storyId;
        storyData = STORIES[storyId];
        storyStep = 0;
        renderStoryStep();
    }

    function renderStoryStep() {
        const container = document.getElementById('chatZone');
        if (!storyData || storyStep >= storyData.steps.length) {
            currentScreen = 'menu';
            renderMenu();
            return;
        }
        const step = storyData.steps[storyStep];
        const isWinStep = step.isWin === true;
        
        let html = `
            <div class="vocab-badge">📘 ${storyData.vocab}</div>
            <div class="bubble ${isWinStep ? 'win-style' : ''}">
                <div class="name">${step.role}</div>
                <div>${step.text}</div>
            </div>
            <div class="status">⚠️ Step ${storyStep+1}/${storyData.steps.length} · Only ONE answer is correct · Think carefully!</div>
        `;
        
        if (step.options && step.options.length > 0) {
            html += `<div class="options">`;
            for (let i=0; i<step.options.length; i++) {
                const opt = step.options[i];
                html += `<button class="btn" data-opt-index="${i}">${opt.text}</button>`;
            }
            html += `</div>`;
        } else {
            html += `<button class="btn reset menu-btn" id="backToMenuBtn">🏠 BACK TO MAIN MENU</button>`;
        }
        
        html += `<div class="footer">✈️ gate · check-in · customs · baggage reclaim · boarding pass · delayed · take off · arrivals · departure lounge</div>`;
        container.innerHTML = html;
        
        if (step.options && step.options.length > 0) {
            for (let i=0; i<step.options.length; i++) {
                const btn = container.querySelector(`.btn[data-opt-index="${i}"]`);
                if (btn) {
                    btn.addEventListener('click', () => {
                        const chosen = step.options[i];
                        if (chosen.nextStep === -1) {
                            showFailAndRestart(chosen.failMsg || "❌ WRONG CHOICE. The passenger is furious. Manager fires you on the spot. Restarting story...");
                        } else {
                            storyStep = chosen.nextStep;
                            renderStoryStep();
                        }
                    });
                }
            }
        }
        
        const backBtn = document.getElementById('backToMenuBtn');
        if (backBtn) {
            backBtn.addEventListener('click', () => {
                currentScreen = 'menu';
                renderMenu();
            });
        }
    }
    
    function showFailAndRestart(message) {
        const container = document.getElementById('chatZone');
        container.innerHTML = `
            <div class="bubble fired">
                <div class="name">💀 FIRED</div>
                <div>${message}</div>
            </div>
            <button class="btn reset" id="restartStoryBtn">🔄 TRY AGAIN (same story)</button>
            <button class="btn reset menu-btn" id="failToMenuBtn">🏠 MAIN MENU</button>
            <div class="footer">✈️ Wrong answer = restart from beginning · Discuss with your group!</div>
        `;
        const restartBtn = document.getElementById('restartStoryBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                if (activeStory) startStory(activeStory);
                else { currentScreen='menu'; renderMenu(); }
            });
        }
        const menuBtn = document.getElementById('failToMenuBtn');
        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                currentScreen = 'menu';
                renderMenu();
            });
        }
    }
    
    renderMenu();
</script>
</body>
</html>
